<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobii | Tactical Dev</title>
    <style>
        :root {
            --redpanda: #ff4a36;
            --electric-blue: #0ff;
            --bg-color: #0d0e15;
            --terminal-green: #39ff14;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* Stops scrollbars for the canvas */
            user-select: none;
        }

        /* Scanline Overlay */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* START SCREEN */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(13, 14, 21, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease-out;
        }

        #start-btn {
            background: transparent;
            color: var(--electric-blue);
            border: 2px solid var(--electric-blue);
            padding: 20px 40px;
            font-size: 1.5rem;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px var(--electric-blue), inset 0 0 15px var(--electric-blue);
            transition: 0.2s;
            text-shadow: 0 0 5px var(--electric-blue);
        }

        #start-btn:hover {
            background: var(--electric-blue);
            color: #000;
            box-shadow: 0 0 30px var(--electric-blue), inset 0 0 30px var(--electric-blue);
        }

        /* BACKGROUND CANVAS */
        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 0;
        }

        /* MAIN CONTENT */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to canvas where needed */
        }

        .hud-container {
            background: rgba(20, 20, 30, 0.7);
            border: 1px solid var(--redpanda);
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 74, 54, 0.3);
            pointer-events: auto; /* Re-enable clicks inside HUD */
            backdrop-filter: blur(5px);
        }

        /* GLITCH EFFECT FOR NAME */
        .glitch {
            font-size: 5rem;
            font-weight: bold;
            position: relative;
            color: white;
            text-shadow: 0 0 10px white;
            margin-bottom: 10px;
        }
        
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 20, 30, 0);
        }
        
        .glitch::before {
            left: 3px;
            text-shadow: -2px 0 var(--redpanda);
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }
        
        .glitch::after {
            left: -3px;
            text-shadow: -2px 0 var(--electric-blue);
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 44px, 0); }
            20% { clip: rect(80px, 9999px, 12px, 0); }
            40% { clip: rect(33px, 9999px, 88px, 0); }
            60% { clip: rect(98px, 9999px, 34px, 0); }
            80% { clip: rect(12px, 9999px, 78px, 0); }
            100% { clip: rect(66px, 9999px, 22px, 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(15px, 9999px, 34px, 0); }
            40% { clip: rect(89px, 9999px, 12px, 0); }
            60% { clip: rect(22px, 9999px, 66px, 0); }
            80% { clip: rect(78px, 9999px, 33px, 0); }
            100% { clip: rect(44px, 9999px, 88px, 0); }
        }

        h2 {
            font-size: 1.5rem;
            color: #ddd;
            margin-bottom: 5px;
        }

        .neon-text {
            color: var(--redpanda);
            text-decoration: none;
            text-shadow: 0 0 8px var(--redpanda);
            transition: 0.3s;
        }
        .neon-text:hover {
            color: white;
            text-shadow: 0 0 15px var(--redpanda), 0 0 30px var(--redpanda);
        }

        p.location {
            color: var(--terminal-green);
            margin-bottom: 30px;
            font-size: 1.2rem;
            text-shadow: 0 0 5px var(--terminal-green);
        }

        /* GAME BUTTONS */
        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .action-btn {
            background: transparent;
            color: white;
            border: 1px solid #555;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: rgba(255, 74, 54, 0.2);
            transition: 0.3s;
            z-index: -1;
        }

        .action-btn:hover {
            border-color: var(--redpanda);
            box-shadow: 0 0 10px var(--redpanda);
        }

        .action-btn:hover::before {
            left: 0;
        }
        
        /* Audio Element (Hidden) */
        audio { display: none; }

    </style>
</head>
<body>

    <audio id="bgm" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-cyberpunk-city-126.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <button id="start-btn">Initiate Sequence</button>
    </div>

    <canvas id="electric-canvas"></canvas>

    <div class="ui-layer">
        <div class="hud-container">
            <h1 class="glitch" data-text="TOBII">TOBII</h1>
            <h2>Tactical Dev @ <a href="https://www.redpanda.com" target="_blank" class="neon-text">Redpanda Data</a></h2>
            <p class="location">LOC: SERBIA [ONLINE]</p>
            
            <div class="controls">
                <button class="action-btn" onclick="alert('Accessing Mainframe...')">View Projects</button>
                <button class="action-btn" onclick="alert('Comm link established.')">Contact</button>
                <button class="action-btn" onclick="alert('Skill Tree Locked. Requires level 10.')">Skill Tree</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Audio & Start Screen Logic ---
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        const bgm = document.getElementById('bgm');

        startBtn.addEventListener('click', () => {
            bgm.volume = 0.5; // Set volume to 50%
            bgm.play().catch(e => console.log("Audio play failed:", e));
            
            // Fade out and remove start screen
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
            }, 500);
        });

        // --- 2. Interactive "Electric Node" Particle System ---
        const canvas = document.getElementById('electric-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        let mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (event) => {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        // Resize canvas on window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            
            // Draw individual particle
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            // Move particle and check mouse interaction
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                // Collision detection with mouse (electric repel effect)
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                
                if (distance < mouse.radius) {
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) this.x += 5;
                    if (mouse.x > this.x && this.x > this.size * 10) this.x -= 5;
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) this.y += 5;
                    if (mouse.y > this.y && this.y > this.size * 10) this.y -= 5;
                }
                
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        // Populate particle array
        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 2) - 1;
                let directionY = (Math.random() * 2) - 1;
                let color = Math.random() > 0.5 ? '#ff4a36' : '#0ff'; // Mix of Redpanda Red and Cyan
                
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        // Draw lines between close particles
        function connectNodes() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) +
                                   ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                        opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = `rgba(0, 255, 255, ${opacityValue})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connectNodes();
        }

        initParticles();
        animate();
    </script>
</body>
</html>
